<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>WIT.Indonesia - Reddie AR</title>
    
    <!-- Standard A-Frame WebXR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- A-Frame Scene -->
    <a-scene background="color: #ffffff" webxr="optionalFeatures: hit-test, local-floor;">
      
      <!-- Assets -->
      <a-assets>
        <!-- Placeholders for the model -->
        <a-asset-item id="reddieModel" src="/assets/Reddie.glb"></a-asset-item>
      </a-assets>

      <!-- Camera -->
      <a-camera
        position="0 4 10"
        raycaster="objects: .cantap"
        cursor="fuse: false; rayOrigin: mouse;">
      </a-camera>

      <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>
      <a-light type="ambient" intensity="1"></a-light>

      <!-- Container for Image Target or Free Placement -->
      <a-entity id="target-container" reddie-controller>
        <!-- 3D Model will appear here when spawned -->
        <a-entity gltf-model="#reddieModel" scale="1.5 1.5 1.5" position="0 0 0" animation-mixer></a-entity>
      </a-entity>

    </a-scene>

    <!-- Landing Screen -->
    <div id="landing-screen">
      <div class="landing-content">
        <img src="/assets/wit-logo.png" alt="WIT Logo" class="landing-logo" />
        <h1>Welcome to Spatial AI</h1>
        <p>Interact with Reddie, the WIT.Indonesia Brand Ambassador.</p>
        
        <div class="mode-buttons">
          <button id="btn-demo-mode" class="mode-btn primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            Interactive Agent (Demo)
          </button>
          
          <button id="btn-scan-mode" class="mode-btn secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"></path></svg>
            Scan Logo (AR)
          </button>
        </div>
      </div>
    </div>

    <!-- UI Overlay for Chat -->
    <div id="chat-ui" class="hidden">
      <div id="chat-messages">
        <div class="message reddie-msg">
          <div class="msg-bubble">Hi! I'm Reddie. How can I help you today?</div>
        </div>
      </div>
      <div id="chat-input-container">
        <input type="text" id="chat-input" placeholder="Ask Reddie a question..." autocomplete="off" />
        <button id="chat-send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
